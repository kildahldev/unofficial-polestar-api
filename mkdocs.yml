site_name: unofficial-polestar-api
site_description: Unofficial async Python client for Polestar vehicle APIs
theme:
  name: material
  features:
    - content.code.copy
    - navigation.instant
    - navigation.sections
    - navigation.top
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            heading_level: 2
            members_order: source
            merge_init_into_class: true
            separate_signature: true
            show_root_heading: true
            show_signature_annotations: true
            show_source: false
markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - toc:
      permalink: true
watch:
  - src/polestar_api
nav:
  - Overview: index.md
  - API Reference:
      - Package: reference/package.md
      - Client: reference/client.md
      - Vehicle: reference/vehicle.md
      - Auth: reference/auth.md
      - Discovery: reference/discovery.md
      - Connection: reference/connection.md
      - gRPC Helpers: reference/grpc.md
      - Wire Codec: reference/wire.md
      - Models: reference/models.md
      - Services: reference/services.md
